<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finch · Stock Research</title>
  <style>
    body {
      background: #05070a;
      color: #f5f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #9ca3b5;
      margin-bottom: 30px;
    }
    input {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      width: 200px;
      margin-right: 10px;
    }
    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #4f8cff;
      color: white;
      cursor: pointer;
    }
    .card {
      background: #0f131a;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    .metric {
      margin-bottom: 8px;
    }
    .ai {
      margin-top: 15px;
      padding: 12px;
      background: #151b24;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Finch</h1>
    <div class="subtitle">Fast fundamentals for everyday investing</div>

    <input id="ticker" placeholder="Enter ticker (AAPL)" />
    <button onclick="loadStock()">Search</button>

    <div id="output" class="card" style="display:none;">
      <h2 id="symbol"></h2>
      <div class="metric" id="price"></div>
      <div class="metric" id="pe"></div>
      <div class="metric" id="fpe"></div>
      <div class="metric" id="rev"></div>
      <div class="metric" id="shares"></div>
      <div class="metric" id="inst"></div>

      <div class="ai" id="ai"></div>
    </div>
  </div>

  <script>
    const mock = {
      AAPL: {
        price: "$195.32",
        pe: "30.5",
        fpe: "27.1",
        revenue: "$383B",
        shares: "15.5B",
        inst: "61%"
      },
      MSFT: {
        price: "$420.45",
        pe: "36.2",
        fpe: "31.8",
        revenue: "$227B",
        shares: "7.4B",
        inst: "72%"
      }
    };

    function loadStock() {
      const ticker = document.getElementById("ticker").value.toUpperCase();
      const data = mock[ticker] || mock["AAPL"];

      document.getElementById("output").style.display = "block";
      document.getElementById("symbol").innerText = ticker;
      document.getElementById("price").innerText = "Price: " + data.price;
      document.getElementById("pe").innerText = "P/E: " + data.pe;
      document.getElementById("fpe").innerText = "Forward P/E: " + data.fpe;
      document.getElementById("rev").innerText = "Revenue (TTM): " + data.revenue;
      document.getElementById("shares").innerText = "Shares Outstanding: " + data.shares;
      document.getElementById("inst").innerText = "Institutional Ownership: " + data.inst;

      document.getElementById("ai").innerText =
        "AI Summary (Prototype): " +
        ticker +
        " shows moderate valuation levels with strong institutional participation. " +
        "This is a static mock summary. In production, this section will call Claude or OpenAI API for live analysis.";
    }
  </script>
</body>
</html>
